<div class="main-container">

  <div class="header-content">
    <h1 class="uni-title">UNIVERSIDAD DEL PAPALOAPAN</h1>
    <img src="assets/logo_unpa.png" alt="Logo UNPA" class="logo-unpa">
  </div>

  <div class="login-card">
    <h2 class="card-title">Bienvenido(a)</h2>

    <form>
      <div class="input-container">
        <input
          type="text"
          placeholder="Matricula"
          [(ngModel)]="matricula"
          name="matricula"
        >
      </div>

      <div class="input-container password-container">
        <input
          [type]="passwordVisible ? 'text' : 'password'"
          placeholder="Contraseña"
          [(ngModel)]="password"
          name="password"
        >

        <div class="eye-icon" (click)="togglePassword()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
            <line *ngIf="!passwordVisible" x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </div>
      </div>

      <button type="button" class="btn-login" (click)="onLogin()">
        INICIAR SESIÓN
      </button>

      <p class="note">
        * NOTA: Para recuperar tu contraseña acude a Servicios Escolares
      </p>
    </form>
  </div>

  <footer class="footer-text">
    Desarrollado por alumnos y profesores de Ingeniería en Computación
  </footer>

</div>
