<div class="wrapper">
  <div class="card">
    <h2>Recuperar contraseña</h2>
    <p>Ingresa el correo electrónico que tienes registrado para enviarte un enlace.</p>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Correo electronico"
      class="input"
      [disabled]="cargando"
    />

    <button class="btn" (click)="enviar()" [disabled]="cargando">
      {{ cargando ? 'Enviando...' : 'Enviar enlace' }}
    </button>

    <button class="btn secondary" (click)="volverLogin()" [disabled]="cargando">
      Volver al login
    </button>

    <div class="error" *ngIf="mensajeError">{{ mensajeError }}</div>
    <div class="success" *ngIf="mensajeExito">{{ mensajeExito }}</div>
  </div>
</div>
