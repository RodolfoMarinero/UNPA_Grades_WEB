<div class="dashboard-container">

  <header class="main-header">
    <div class="header-top">
      <h1 class="app-title">UNPA Grades</h1>
      <img src="assets/logo_unpa.png" alt="Logo UNPA" class="mini-logo">
    </div>

    <nav class="top-nav">
      <ul>
        <li class="nav-item" (click)="irAHome()">CALIFICACIONES</li>
        <li class="nav-item" (click)="irANotificaciones()">NOTIFICACIONES</li>
        <li class="nav-item active" (click)="irACalendarioExamenes()">CALENDARIO</li>
        <li class="nav-item" (click)="irAlPerfil()">PERFIL</li>
      </ul>
    </nav>
  </header>

  <div class="view-container">
    <main class="main-content">

      <div class="calendar-header-titles">
        <h2>Calendario Escolar</h2>
        <p>{{ periodo }}</p>
      </div>

      <div class="calendar-layout">

        <div class="months-column">
          <div class="months-grid">
            <div class="month-card" *ngFor="let mes of meses">
              <h3 class="month-title">{{ mes.nombre }}</h3>
              <div class="days-header">
                <span *ngFor="let d of diasSemana">{{ d }}</span>
              </div>
              <div class="days-grid">
                <div class="day empty" *ngFor="let e of mes.espacios"></div>
                <div class="day" *ngFor="let dia of mes.dias">
                  <span class="day-number"
                        [ngClass]="dia.tipo"
                        (click)="onDayClick(dia)"
                        [style.cursor]="dia.tipo === 'morado' ? 'pointer' : 'default'">
                    {{ dia.num }}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="events-column">
          <div class="events-list">
            <div class="event-pill" *ngFor="let ev of eventos">
              <div class="hex-badge">
                <div class="hex-inner">
                  <span class="badge-day">{{ ev.dia }}</span>
                  <span class="badge-month">{{ ev.mesStr }}</span>
                </div>
              </div>

              <div class="event-text-container">
                <span class="event-type">{{ ev.tipoExamen }}</span>
                <span class="event-materia">{{ ev.materia }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" *ngIf="mostrarModal" (click)="cerrarModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ tituloModal }}</h3>
      <button class="btn-close" (click)="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="exam-detail-item" *ngFor="let ex of eventosModal">
        <div class="exam-info">
          <p class="exam-materia"><strong>Materia:</strong> {{ ex.materia }}</p>
          <p class="exam-tipo"><strong>Tipo:</strong> {{ ex.tipoExamen }}</p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-entendido" (click)="cerrarModal()">Entendido</button>
    </div>
  </div>
</div>
