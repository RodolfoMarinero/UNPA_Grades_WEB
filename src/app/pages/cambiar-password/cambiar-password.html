<div class="change-pass-container">

  <div class="logo-area">
    <img src="assets/unpa_logo_blue.png" alt="UNPA Logo" class="logo">
  </div>

  <div class="form-container">

    @if (esPrimerAcceso) {
      <div class="alert warning">
        Por seguridad, debes cambiar tu contraseña predeterminada antes de continuar.
      </div>
    }

    @if (mensajeError) { <div class="alert error">{{ mensajeError }}</div> }
    @if (mensajeExito) { <div class="alert success">{{ mensajeExito }}</div> }

    @if (!esPrimerAcceso) {
      <div class="input-group">
        <input
          [type]="mostrarActual ? 'text' : 'password'"
          [(ngModel)]="passActual"
          placeholder="Contraseña Actual"
          class="input-field">
        <span class="eye-icon" (click)="toggleActual()">
          <svg *ngIf="mostrarActual" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg *ngIf="!mostrarActual" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </span>
      </div>
    }

    <div class="input-group">
      <input
        [type]="mostrarNueva ? 'text' : 'password'"
        [(ngModel)]="passNueva"
        placeholder="Nueva Contraseña"
        class="input-field">
      <span class="eye-icon" (click)="toggleNueva()">
        <svg *ngIf="mostrarNueva" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <svg *ngIf="!mostrarNueva" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
      </span>
    </div>

    <div class="input-group">
      <input
        [type]="mostrarConfirmacion ? 'text' : 'password'"
        [(ngModel)]="passConfirmacion"
        placeholder="Confirmar Contraseña"
        class="input-field">
      <span class="eye-icon" (click)="toggleConfirmacion()">
        <svg *ngIf="mostrarConfirmacion" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <svg *ngIf="!mostrarConfirmacion" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
      </span>
    </div>

    <div class="button-group">
      <button class="btn-confirm" (click)="cambiar()" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Confirmar' }}
      </button>

      @if (!esPrimerAcceso) {
        <button class="btn-cancel" (click)="cancelar()">
          Volver
        </button>
      }
    </div>

  </div>

</div>
